name: Scrape Google Rating
 
on:
  schedule:
    # Runs every 30 minutes
    - cron: "*/30 * * * *"
  workflow_dispatch: # allows manual trigger from GitHub UI
 
permissions:
  contents: write # needed to commit ratings.json back to the repo
 
jobs:
  scrape:
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
 
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
 
      - name: Install dependencies
        run: pip install requests beautifulsoup4
 
      - name: Run scraper
        env:
          # Optional: store the exact Maps URL as a repo secret for flexibility
          GOOGLE_MAPS_URL: ${{ secrets.GOOGLE_MAPS_URL }}
        run: python scraper.py
 
      - name: Commit updated ratings
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ratings.json
          # Only commit if there's actually a change
          git diff --cached --quiet || git commit -m "chore: update ratings [skip ci]"
          git push
 
