name: Scrape Google Rating
 
on:
  schedule:
    - cron: '0 8 * * *'   # Runs daily at 8:00 AM UTC
  workflow_dispatch:        # Also allows manual runs
 
jobs:
  scrape:
    runs-on: ubuntu-latest
 
    permissions:
      contents: write       # Needed to commit updated ratings.json
 
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
 
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
 
      - name: Install dependencies
        run: pip install requests
 
      - name: Run scraper
        env:
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
        run: python scraper.py
 
      - name: Commit updated ratings
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ratings.json
          git diff --cached --quiet || git commit -m "Update ratings $(date -u '+%Y-%m-%d')"
          git push
 
