<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Avis – Location Rating Dashboard</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap');

    :root {
      --avis-red: #CC0000;
      --avis-red-dim: rgba(204,0,0,0.12);
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface-2: #242424;
      --border: #2e2e2e;
      --text: #f0f0f0;
      --text-muted: #888;
      --green: #22c55e;
      --yellow: #f59e0b;
      --mono: 'DM Mono', monospace;
      --sans: 'Inter', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      border-bottom: 1px solid var(--border);
      padding: 20px 32px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo-bar {
      display: flex;
      align-items: center;
      gap: 14px;
      flex: 1;
    }

    .logo-badge {
      background: var(--avis-red);
      color: #fff;
      font-weight: 700;
      font-size: 20px;
      letter-spacing: 2px;
      padding: 6px 14px;
      border-radius: 4px;
    }

    .header-title {
      font-size: 15px;
      font-weight: 500;
      color: var(--text-muted);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .last-updated {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text-muted);
    }

    /* ── Layout ── */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 36px 24px;
    }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 16px;
    }

    /* ── Summary Row ── */
    .summary-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin-bottom: 40px;
    }

    .summary-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
    }

    .summary-card .label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .summary-card .value {
      font-family: var(--mono);
      font-size: 32px;
      font-weight: 500;
      color: var(--text);
    }

    .summary-card .value.red { color: var(--avis-red); }
    .summary-card .sub {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* ── Location Cards ── */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
      margin-bottom: 48px;
    }

    .location-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      position: relative;
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .location-card:hover { border-color: var(--avis-red); }

    .location-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--avis-red);
    }

    .card-name {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .card-address {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 20px;
      line-height: 1.5;
    }

    .rating-display {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 8px;
    }

    .rating-number {
      font-family: var(--mono);
      font-size: 40px;
      font-weight: 500;
      line-height: 1;
    }

    .stars {
      display: flex;
      gap: 3px;
    }

    .star {
      font-size: 16px;
      color: var(--border);
    }

    .star.filled { color: #f59e0b; }
    .star.half { color: #f59e0b; opacity: 0.5; }

    .review-count {
      font-size: 13px;
      color: var(--text-muted);
      font-family: var(--mono);
    }

    .card-updated {
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--text-muted);
      font-family: var(--mono);
    }

    /* ── Charts ── */
    .charts-section { margin-bottom: 48px; }

    .chart-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 16px;
    }

    .chart-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 20px;
    }

    canvas { max-height: 260px; }

    /* ── Empty / Error State ── */
    .empty-state {
      text-align: center;
      padding: 60px 24px;
      color: var(--text-muted);
    }

    .empty-state h2 { font-size: 18px; margin-bottom: 8px; color: var(--text); }
    .empty-state p { font-size: 14px; line-height: 1.6; }
    .empty-state code {
      background: var(--surface-2);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: var(--mono);
      font-size: 13px;
    }

    @media (max-width: 600px) {
      header { padding: 16px; }
      main { padding: 20px 16px; }
      .rating-number { font-size: 32px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo-bar">
    <span class="logo-badge">AVIS</span>
    <span class="header-title">Location Rating Dashboard</span>
  </div>
  <span class="last-updated" id="lastUpdated">Loading…</span>
</header>

<main>
  <div id="app">
    <div class="empty-state">
      <h2>Loading dashboard…</h2>
      <p>Fetching ratings data.</p>
    </div>
  </div>
</main>

<script>
const DATA_URL = 'data/ratings.json';

async function loadData() {
  try {
    const res = await fetch(DATA_URL + '?t=' + Date.now());
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return await res.json();
  } catch (e) {
    return null;
  }
}

function renderStars(rating) {
  if (!rating) return '';
  const full = Math.floor(rating);
  const half = rating % 1 >= 0.5;
  let html = '';
  for (let i = 1; i <= 5; i++) {
    if (i <= full) html += `<span class="star filled">★</span>`;
    else if (i === full + 1 && half) html += `<span class="star half">★</span>`;
    else html += `<span class="star">★</span>`;
  }
  return html;
}

function buildSummary(locations) {
  const vals = Object.values(locations).filter(l => l.rating);
  if (!vals.length) return '';
  const avg = (vals.reduce((s, l) => s + l.rating, 0) / vals.length).toFixed(2);
  const totalReviews = vals.reduce((s, l) => s + (l.review_count || 0), 0);
  const best = vals.reduce((a, b) => a.rating > b.rating ? a : b);

  return `
    <p class="section-label">Overview</p>
    <div class="summary-row">
      <div class="summary-card">
        <div class="label">Avg Rating</div>
        <div class="value red">${avg}</div>
        <div class="sub">across ${vals.length} location${vals.length > 1 ? 's' : ''}</div>
      </div>
      <div class="summary-card">
        <div class="label">Total Reviews</div>
        <div class="value">${totalReviews.toLocaleString()}</div>
        <div class="sub">combined</div>
      </div>
      <div class="summary-card">
        <div class="label">Top Location</div>
        <div class="value" style="font-size:20px;line-height:1.3">${best.name.replace('Avis ', '')}</div>
        <div class="sub">${best.rating} ⭐</div>
      </div>
    </div>
  `;
}

function buildCards(locations) {
  let html = `<p class="section-label">Locations</p><div class="cards-grid">`;
  for (const [id, loc] of Object.entries(locations)) {
    html += `
      <div class="location-card">
        <div class="card-name">${loc.name}</div>
        <div class="card-address">${loc.address || ''}</div>
        <div class="rating-display">
          <span class="rating-number">${loc.rating ?? '—'}</span>
          <div class="stars">${renderStars(loc.rating)}</div>
        </div>
        <div class="review-count">${loc.review_count ? loc.review_count.toLocaleString() + ' reviews' : 'No review count'}</div>
        <div class="card-updated">Updated ${loc.last_updated || 'unknown'}</div>
      </div>
    `;
  }
  return html + '</div>';
}

function buildCharts(locations, history) {
  const ids = Object.keys(history);
  if (!ids.length) return '';

  // Gather all dates across all locations
  const allDates = [...new Set(
    ids.flatMap(id => history[id].map(h => h.date))
  )].sort();

  const colors = ['#CC0000', '#f59e0b', '#22c55e', '#60a5fa', '#a78bfa'];

  // Rating chart data
  const ratingDatasets = ids.map((id, i) => {
    const loc = locations[id];
    const map = Object.fromEntries(history[id].map(h => [h.date, h.rating]));
    return {
      label: loc?.name || id,
      data: allDates.map(d => map[d] ?? null),
      borderColor: colors[i % colors.length],
      backgroundColor: colors[i % colors.length] + '22',
      tension: 0.4,
      spanGaps: true,
      pointRadius: 4,
    };
  });

  // Review count chart data
  const reviewDatasets = ids.map((id, i) => {
    const loc = locations[id];
    const map = Object.fromEntries(history[id].map(h => [h.date, h.review_count]));
    return {
      label: loc?.name || id,
      data: allDates.map(d => map[d] ?? null),
      borderColor: colors[i % colors.length],
      backgroundColor: colors[i % colors.length] + '22',
      tension: 0.4,
      spanGaps: true,
      pointRadius: 4,
    };
  });

  const chartOpts = (yLabel, min, max) => ({
    responsive: true,
    plugins: { legend: { labels: { color: '#888', font: { size: 12 } } } },
    scales: {
      x: { ticks: { color: '#666', font: { size: 11 } }, grid: { color: '#2e2e2e' } },
      y: {
        ticks: { color: '#666', font: { size: 11 } },
        grid: { color: '#2e2e2e' },
        title: { display: true, text: yLabel, color: '#666' },
        ...(min !== undefined ? { min, max } : {}),
      }
    }
  });

  return `
    <p class="section-label">Rating History</p>
    <div class="charts-section">
      <div class="chart-wrap">
        <div class="chart-title">Star Rating Over Time</div>
        <canvas id="ratingChart"></canvas>
      </div>
      <div class="chart-wrap">
        <div class="chart-title">Review Count Over Time</div>
        <canvas id="reviewChart"></canvas>
      </div>
    </div>
  `;

  // Note: charts rendered after DOM insertion
}

async function render() {
  const data = await loadData();
  const app = document.getElementById('app');
  const lastUpdated = document.getElementById('lastUpdated');

  if (!data || !data.locations || !Object.keys(data.locations).length) {
    app.innerHTML = `
      <div class="empty-state">
        <h2>No data yet</h2>
        <p>Run the scraper workflow to populate ratings.<br>
        Make sure <code>GOOGLE_PLACES_API_KEY</code> is set as a GitHub secret and<br>
        <code>data/ratings.json</code> exists in your repo.</p>
      </div>
    `;
    lastUpdated.textContent = 'No data';
    return;
  }

  const dates = Object.values(data.locations).map(l => l.last_updated).filter(Boolean);
  lastUpdated.textContent = dates.length ? `Last updated ${[...dates].sort().reverse()[0]}` : '';

  app.innerHTML =
    buildSummary(data.locations) +
    buildCards(data.locations) +
    buildCharts(data.locations, data.history || {});

  // Draw charts if history exists
  const allIds = Object.keys(data.history || {});
  if (allIds.length) {
    const allDates = [...new Set(
      allIds.flatMap(id => (data.history[id] || []).map(h => h.date))
    )].sort();
    const colors = ['#CC0000', '#f59e0b', '#22c55e', '#60a5fa', '#a78bfa'];

    const makeDatasets = (key) => allIds.map((id, i) => {
      const loc = data.locations[id];
      const map = Object.fromEntries((data.history[id] || []).map(h => [h.date, h[key]]));
      return {
        label: loc?.name || id,
        data: allDates.map(d => map[d] ?? null),
        borderColor: colors[i % colors.length],
        backgroundColor: colors[i % colors.length] + '22',
        tension: 0.4, spanGaps: true, pointRadius: 4,
      };
    });

    const sharedOpts = (yLabel, yMin, yMax) => ({
      responsive: true,
      plugins: { legend: { labels: { color: '#888', font: { size: 12 } } } },
      scales: {
        x: { ticks: { color: '#666', font: { size: 11 } }, grid: { color: '#2e2e2e' } },
        y: {
          ticks: { color: '#666' }, grid: { color: '#2e2e2e' },
          title: { display: true, text: yLabel, color: '#666' },
          ...(yMin !== undefined ? { min: yMin, max: yMax } : {}),
        }
      }
    });

    new Chart(document.getElementById('ratingChart'), {
      type: 'line',
      data: { labels: allDates, datasets: makeDatasets('rating') },
      options: sharedOpts('Rating', 1, 5),
    });

    new Chart(document.getElementById('reviewChart'), {
      type: 'line',
      data: { labels: allDates, datasets: makeDatasets('review_count') },
      options: sharedOpts('Reviews'),
    });
  }
}

render();
</script>
</body>
</html>
